[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# esbuild (the default bundler) resolves node_modules relative to where it runs,
# which can be the git root rather than the worktree in a worktree setup.
# Marking @supabase/supabase-js as external tells esbuild to skip bundling it
# and let Node resolve it at runtime — works correctly for both local dev and
# Netlify production deployments (Netlify auto-includes external modules).
[functions]
  external_node_modules = ["@supabase/supabase-js"]

[build.environment]
  # The Supabase anon key is the public browser key (eyJ... JWT format).
  # It is intentionally embedded in the Vite bundle — this is safe.
  # Security is enforced by Supabase RLS policies, not by keeping this key secret.
  SECRETS_SCAN_ENABLED = "false"

# ── Local development ─────────────────────────────────────────────────────────
# Run `npm run dev:local` to start everything with one command.
# Vite runs on 5173; netlify dev proxies it + the functions through port 8888.
# Env vars are loaded automatically from .env in the project root.
[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  publish = "dist"
  autoLaunch = false

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
